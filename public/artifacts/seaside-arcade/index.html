<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Shrimp Panic '86</title>
    <style>
      :root {
        --bg: #060215;
        --scan-a: rgba(255, 62, 181, 0.12);
        --scan-b: rgba(55, 255, 230, 0.09);
        --panel: #10072a;
        --ink: #fcf3ff;
        --accent: #ffef66;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 10%, #321068 0%, transparent 45%),
          radial-gradient(circle at 80% 90%, #103761 0%, transparent 40%),
          var(--bg);
        color: var(--ink);
        font-family: "Courier New", monospace;
        image-rendering: pixelated;
      }
      .cabinet {
        width: min(92vw, 760px);
        border: 4px solid #422067;
        background: linear-gradient(180deg, #1a0e3e, var(--panel));
        box-shadow: 0 0 0 4px #070116, 0 28px 60px rgba(0, 0, 0, 0.6);
        border-radius: 8px;
        padding: 14px;
      }
      .marquee {
        text-align: center;
        font-size: clamp(16px, 2.8vw, 24px);
        font-weight: 700;
        letter-spacing: 0.1em;
        color: var(--accent);
        margin-bottom: 10px;
        text-shadow: 0 0 10px rgba(255, 238, 102, 0.8);
      }
      .screen-wrap {
        position: relative;
        border: 4px solid #2a1746;
        background: #04020e;
        padding: 8px;
      }
      canvas {
        width: 100%;
        display: block;
        border: 2px solid #26153e;
        background: #08051a;
      }
      .screen-wrap::after {
        content: "";
        position: absolute;
        inset: 8px;
        pointer-events: none;
        background: repeating-linear-gradient(
          180deg,
          transparent 0px,
          transparent 3px,
          var(--scan-a) 3px,
          var(--scan-b) 4px
        );
        mix-blend-mode: screen;
      }
      .hud {
        margin-top: 10px;
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        opacity: 0.95;
      }
      .btns {
        margin-top: 10px;
        font-size: 11px;
        color: #e8dcff;
      }
      .pill {
        display: inline-block;
        padding: 2px 6px;
        border: 1px solid #5f4195;
        margin: 0 4px 4px 0;
        border-radius: 999px;
        background: #211045;
      }
    </style>
  </head>
  <body>
    <main class="cabinet">
      <div class="marquee">NEON SHRIMP PANIC '86</div>
      <section class="screen-wrap">
        <canvas id="game" width="640" height="384" aria-label="Neon Shrimp Panic game canvas"></canvas>
      </section>
      <div class="hud">
        <span id="score">SCORE 00000</span>
        <span id="wave">WAVE 1</span>
        <span id="lives">LIVES 3</span>
      </div>
      <div class="btns">
        <span class="pill">MOVE: ← → or A / D</span>
        <span class="pill">ZAP: SPACE</span>
        <span class="pill">BONK COMBOS FOR BIG POINTS</span>
      </div>
    </main>

    <script>
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const waveEl = document.getElementById('wave');
      const livesEl = document.getElementById('lives');

      const W = canvas.width;
      const H = canvas.height;
      const keys = new Set();

      const state = {
        player: { x: W / 2 - 16, y: H - 48, w: 32, h: 20, speed: 5 },
        bolts: [],
        enemies: [],
        particles: [],
        score: 0,
        wave: 1,
        lives: 3,
        cooldown: 0,
        gameOver: false,
        tick: 0,
      };

      const enemyTypes = [
        { name: 'angry gull', color: '#ff6b99', speed: 1.2, wobble: 1.8, points: 80, shape: 'gull' },
        { name: 'crab drone', color: '#58fcec', speed: 0.95, wobble: 1.2, points: 110, shape: 'crab' },
        { name: 'soda octopus', color: '#ffef66', speed: 0.8, wobble: 2.6, points: 140, shape: 'octo' },
      ];

      function spawnWave() {
        state.enemies = [];
        const rows = Math.min(3 + Math.floor(state.wave / 2), 6);
        const cols = 10;
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const type = enemyTypes[(r + c + state.wave) % enemyTypes.length];
            state.enemies.push({
              x: 44 + c * 54,
              y: 38 + r * 36,
              w: 28,
              h: 20,
              type,
              phase: Math.random() * Math.PI * 2,
            });
          }
        }
      }

      function fire() {
        if (state.cooldown > 0 || state.gameOver) return;
        state.bolts.push({ x: state.player.x + state.player.w / 2 - 2, y: state.player.y - 10, w: 4, h: 10, vy: -8 });
        state.cooldown = 10;
      }

      function explode(x, y, color) {
        for (let i = 0; i < 12; i++) {
          state.particles.push({
            x,
            y,
            vx: (Math.random() - 0.5) * 4,
            vy: (Math.random() - 0.5) * 4,
            life: 24 + Math.random() * 18,
            color,
          });
        }
      }

      function overlaps(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function update() {
        state.tick++;
        if (state.cooldown > 0) state.cooldown--;

        if (!state.gameOver) {
          if (keys.has('ArrowLeft') || keys.has('a')) state.player.x -= state.player.speed;
          if (keys.has('ArrowRight') || keys.has('d')) state.player.x += state.player.speed;
          state.player.x = Math.max(8, Math.min(W - state.player.w - 8, state.player.x));
        }

        for (const b of state.bolts) b.y += b.vy;
        state.bolts = state.bolts.filter((b) => b.y > -20);

        const dropSpeed = 0.16 + state.wave * 0.035;
        state.enemies.forEach((e, i) => {
          e.y += dropSpeed;
          e.x += Math.sin(state.tick * 0.03 * e.type.wobble + e.phase) * e.type.speed;

          if (e.y + e.h >= state.player.y && !state.gameOver) {
            state.lives -= 1;
            explode(state.player.x + state.player.w / 2, state.player.y, '#ff5577');
            state.player.x = W / 2 - 16;
            state.enemies.splice(i, 1);
            if (state.lives <= 0) state.gameOver = true;
          }
        });

        for (let i = state.bolts.length - 1; i >= 0; i--) {
          const bolt = state.bolts[i];
          for (let j = state.enemies.length - 1; j >= 0; j--) {
            const enemy = state.enemies[j];
            if (overlaps(bolt, enemy)) {
              explode(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, enemy.type.color);
              state.score += enemy.type.points;
              state.enemies.splice(j, 1);
              state.bolts.splice(i, 1);
              break;
            }
          }
        }

        state.particles.forEach((p) => {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.02;
          p.life -= 1;
        });
        state.particles = state.particles.filter((p) => p.life > 0);

        if (!state.gameOver && state.enemies.length === 0) {
          state.wave += 1;
          state.score += 500;
          spawnWave();
        }

        scoreEl.textContent = `SCORE ${String(state.score).padStart(5, '0')}`;
        waveEl.textContent = `WAVE ${state.wave}`;
        livesEl.textContent = `LIVES ${state.lives}`;
      }

      function drawEnemy(e) {
        ctx.fillStyle = e.type.color;
        if (e.type.shape === 'gull') {
          ctx.fillRect(e.x, e.y + 7, e.w, 8);
          ctx.fillRect(e.x + 4, e.y + 3, 6, 4);
          ctx.fillRect(e.x + 18, e.y + 3, 6, 4);
        } else if (e.type.shape === 'crab') {
          ctx.fillRect(e.x + 5, e.y + 6, 18, 10);
          ctx.fillRect(e.x, e.y + 8, 5, 4);
          ctx.fillRect(e.x + 23, e.y + 8, 5, 4);
          ctx.fillRect(e.x + 8, e.y + 16, 4, 3);
          ctx.fillRect(e.x + 16, e.y + 16, 4, 3);
        } else {
          ctx.fillRect(e.x + 8, e.y + 4, 12, 12);
          for (let k = 0; k < 4; k++) ctx.fillRect(e.x + 2 + k * 7, e.y + 16, 3, 4);
        }
      }

      function render() {
        const pulse = 12 + Math.sin(state.tick * 0.04) * 8;
        ctx.fillStyle = `rgb(${8 + pulse},${5},${26 + pulse})`;
        ctx.fillRect(0, 0, W, H);

        for (let y = 0; y < H; y += 32) {
          ctx.fillStyle = y % 64 === 0 ? '#1a0d35' : '#110824';
          ctx.fillRect(0, y, W, 16);
        }

        ctx.fillStyle = '#46ddff';
        ctx.fillRect(state.player.x + 12, state.player.y, 8, 6);
        ctx.fillStyle = '#ff4ec4';
        ctx.fillRect(state.player.x, state.player.y + 6, 32, 12);
        ctx.fillStyle = '#ffe26c';
        ctx.fillRect(state.player.x + 4, state.player.y + 10, 24, 4);

        ctx.fillStyle = '#97f8ff';
        state.bolts.forEach((b) => ctx.fillRect(b.x, b.y, b.w, b.h));

        state.enemies.forEach(drawEnemy);

        state.particles.forEach((p) => {
          ctx.globalAlpha = p.life / 40;
          ctx.fillStyle = p.color;
          ctx.fillRect(p.x, p.y, 3, 3);
          ctx.globalAlpha = 1;
        });

        if (state.gameOver) {
          ctx.fillStyle = 'rgba(0,0,0,0.5)';
          ctx.fillRect(120, 130, 400, 120);
          ctx.fillStyle = '#ffef66';
          ctx.font = 'bold 28px "Courier New", monospace';
          ctx.fillText('INSERT COIN TO RETRY', 150, 180);
          ctx.font = '16px "Courier New", monospace';
          ctx.fillStyle = '#f5dcff';
          ctx.fillText('Press ENTER for one more absurd wave', 170, 214);
        }
      }

      function loop() {
        update();
        render();
        requestAnimationFrame(loop);
      }

      addEventListener('keydown', (e) => {
        const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;
        keys.add(key);
        if (key === ' ') {
          e.preventDefault();
          fire();
        }
        if (key === 'Enter' && state.gameOver) {
          state.score = 0;
          state.wave = 1;
          state.lives = 3;
          state.gameOver = false;
          state.bolts = [];
          state.particles = [];
          spawnWave();
        }
      });

      addEventListener('keyup', (e) => {
        const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;
        keys.delete(key);
      });

      spawnWave();
      loop();
    </script>
  </body>
</html>
